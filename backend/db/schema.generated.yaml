      views:
        - name: public_creator_profiles
          columns:
            - name: user_id
              type: uuid
              nullable: true
            - name: display_name
              type: text
              nullable: true
            - name: avatar_url
              type: text
              nullable: true
            - name: bio
              type: text
              nullable: true
            - name: published_at
              type: timestamp with time zone
              nullable: true
            - name: created_at
              type: timestamp with time zone
              nullable: true
            - name: updated_at
              type: timestamp with time zone
              nullable: true
            - name: handle
              type: text
              nullable: true
          definition: |-
            SELECT p.user_id,
                p.display_name,
                p.avatar_url,
                p.bio,
                p.published_at,
                p.created_at,
                p.updated_at,
                p.handle
               FROM app.creator_profiles p
                 JOIN app.creator_capabilities c ON c.user_id = p.user_id
              WHERE c.state = 'approved'::text AND p.published_at IS NOT NULL;
        - name: public_shorts
          columns:
            - name: id
              type: uuid
              nullable: true
            - name: creator_user_id
              type: uuid
              nullable: true
            - name: canonical_main_id
              type: uuid
              nullable: true
            - name: media_asset_id
              type: uuid
              nullable: true
            - name: caption
              type: text
              nullable: true
            - name: state
              type: text
              nullable: true
            - name: review_reason_code
              type: text
              nullable: true
            - name: post_report_state
              type: text
              nullable: true
            - name: approved_for_publish_at
              type: timestamp with time zone
              nullable: true
            - name: published_at
              type: timestamp with time zone
              nullable: true
            - name: created_at
              type: timestamp with time zone
              nullable: true
            - name: updated_at
              type: timestamp with time zone
              nullable: true
          definition: |-
            SELECT s.id,
                s.creator_user_id,
                s.canonical_main_id,
                s.media_asset_id,
                s.caption,
                s.state,
                s.review_reason_code,
                s.post_report_state,
                s.approved_for_publish_at,
                s.published_at,
                s.created_at,
                s.updated_at
               FROM app.shorts s
                 JOIN app.unlockable_mains m ON m.id = s.canonical_main_id
                 JOIN app.creator_capabilities c ON c.user_id = s.creator_user_id
              WHERE c.state = 'approved'::text AND s.state = 'approved_for_publish'::text AND s.published_at IS NOT NULL AND (s.post_report_state IS NULL OR (s.post_report_state <> ALL (ARRAY['temporarily_limited'::text, 'removed'::text])));
